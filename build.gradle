plugins {
	id 'java'
	id 'maven-publish'
}

group = 'io.github.zpring'

java {
    withSourcesJar()
    withJavadocJar()
}

repositories {
	mavenCentral()
}

dependencies {
	testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
	testImplementation 'org.assertj:assertj-core:3.27.7'

	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
}

if (hasProperty('deploymentRepository')) {
	publishing {
		repositories {
			maven {
				name "deployment"
				url "${deploymentRepository}"
			}
		}
		publications {
			maven(MavenPublication) {
				from components.java
			}
		}
	}
}
