name: "Pull Request"
"on":
  pull_request: {}
permissions:
  contents: "read"
jobs:
  build-pull-request:
    name: "Build Pull Request"
    if: "${{ github.repository == 'zpring/zpring-framework' }}"
    runs-on: "ubuntu-latest"
    steps:
    - name: "Check Out Code"
      id: "check-out-code"
      uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # 6.0.2
    - name: "Set up Java"
      id: "set-up-java"
      uses: "actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654" # 5.2.0
      with:
        distribution: "liberica"
        java-version: "25"
    - name: "Set up Gradle"
      id: "set-up-gradle"
      uses: "gradle/actions@0723195856401067f7a2779048b490ace7a47d7c" # 5.0.2
      with:
        cache-read-only: "true"
    - name: "Build"
      id: "build"
      uses: "./.github/actions/build"
    - name: "Upload Build Reports"
      id: "upload-build-reports"
      if: "failure()"
      uses: "actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # 7.0.1
      with:
        name: "build-reports"
        path: "**/build/reports"
