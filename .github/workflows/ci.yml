name: "CI"
"on":
  push:
    branches:
    - "main"
permissions:
  contents: "read"
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
jobs:
  ci:
    name: "CI"
    runs-on: "${{ matrix.os.id }}"
    strategy:
      matrix:
        java:
        - version: 17
        - version: 21
        - version: 25
        - version: 26
        os:
        - name: "Linux"
          id: "ubuntu-latest"
        include:
        - java:
            version: 25
          os:
            name: "Windows"
            id: "windows-latest"
        exclude:
        - java:
            version: 25
          os:
            name: "Linux"
    steps:
    - name: "Set up Java"
      id: "set-up-java"
      uses: "actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654" # 5.2.0
      with:
        distribution: "liberica"
        java-version: "${{ matrix.java.version }}"
    - name: "Check Out Code"
      id: "check-out-code"
      uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # 6.0.2
    - name: "Build"
      id: "build"
      uses: "./.github/actions/build"
